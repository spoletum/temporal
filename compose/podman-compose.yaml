# Podman Compose stack for local development.
#
# Brings up:
#   - Temporal dev server  ........  workflow orchestration (gRPC 7233, UI 8233)
#   - PayR.Temporal.SayHello.Worker  ........  Temporal worker (hot-reload via dotnet watch)
#   - PayR.Temporal.Psp.Validator.Worker / Payout.Worker  ........  PSP workers
#   - Account / document validation mocks  ........  external HTTP services for the Validator
#   - PayR.Temporal.Web  ........  Blazor UI (hot-reload via dotnet watch)
#
# Usage:
#   podman compose --file compose/podman-compose.yaml --env-file compose/.env up -d
#
# Notes:
#   * The worker bind-mounts the repo root so `dotnet watch` can rebuild on
#     file changes. The image only restores packages; the source comes from
#     the volume mount.

name: payr-temporal-dev

services:
  # ---------------------------------------------------------------------------
  # Temporal dev server (gRPC + Web UI in one container)
  # ---------------------------------------------------------------------------
  temporal:
    image: docker.io/temporalio/temporal:latest
    restart: unless-stopped
    command:
      - server
      - start-dev
      - --ip=0.0.0.0
      - --log-level=error
      - --db-filename=/var/lib/temporal/temporal-dev.db
      - --namespace=default
      - --namespace=say-hello
      - --namespace=payout
    ports:
      - "${TEMPORAL_GRPC_PORT:-7233}:7233" # gRPC (worker connects here)
      - "${TEMPORAL_UI_PORT:-8233}:8233" # Web UI
    volumes:
      - temporal-data:/var/lib/temporal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "temporal operator cluster describe --address localhost:7233 | grep -q ClusterName || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - devnet

  # ---------------------------------------------------------------------------
  # PayR.Temporal.SayHello.Worker (hot-reload via dotnet watch)
  # ---------------------------------------------------------------------------
  worker:
    image: payr-temporal-worker:dev
    build:
      context: ..
      dockerfile: compose/Dockerfile.worker
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: say-hello
      DOTNET_ENVIRONMENT: Development
    volumes:
      # Bind-mount the repo root so `dotnet watch` sees source changes.
      - ..:/app
      # Keep container-side NuGet cache separate from the host's.
      - worker-nuget:/root/.nuget/packages
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - devnet

  # ---------------------------------------------------------------------------
  # PayR.Temporal.Web (Blazor UI, hot-reload via dotnet watch)
  # ---------------------------------------------------------------------------
  web:
    image: payr-temporal-web:dev
    build:
      context: ..
      dockerfile: compose/Dockerfile.web
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      ASPNETCORE_ENVIRONMENT: Development
      # Override the Temporal connection section via environment variables.
      # The Web UI starts workflows in two namespaces (say-hello, payout);
      # TemporalClientProvider builds one client per namespace on demand.
      Temporal__Address: temporal:7233
      Temporal__UiUrl: ${TEMPORAL_UI_URL:-http://localhost:8233}
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      # Bind-mount the repo root so `dotnet watch` sees source changes.
      - ..:/app
      # Keep container-side NuGet cache separate from the host's.
      - web-nuget:/root/.nuget/packages
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - devnet

  # ---------------------------------------------------------------------------
  # Account validation mock service (external HTTP service)
  # ---------------------------------------------------------------------------
  account-validation-mock:
    image: payr-account-validation-mock:dev
    build:
      context: ..
      dockerfile: compose/Dockerfile.account-mock
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "${ACCOUNT_MOCK_PORT:-8081}:8080"
    volumes:
      - ..:/app
      - account-mock-nuget:/root/.nuget/packages
    networks:
      - devnet

  # ---------------------------------------------------------------------------
  # Document validation mock service (external HTTP service)
  # ---------------------------------------------------------------------------
  document-validation-mock:
    image: payr-document-validation-mock:dev
    build:
      context: ..
      dockerfile: compose/Dockerfile.document-mock
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "${DOCUMENT_MOCK_PORT:-8082}:8080"
    volumes:
      - ..:/app
      - document-mock-nuget:/root/.nuget/packages
    networks:
      - devnet

  # ---------------------------------------------------------------------------
  # PayR.Temporal.Psp.Validator.Worker (hot-reload via dotnet watch)
  # ---------------------------------------------------------------------------
  validator-worker:
    image: payr-validator-worker:dev
    build:
      context: ..
      dockerfile: compose/Dockerfile.validator-worker
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: payout
      DOTNET_ENVIRONMENT: Development
      ACCOUNT_VALIDATION_URL: http://account-validation-mock:8080
      DOCUMENT_VALIDATION_URL: http://document-validation-mock:8080
    volumes:
      - ..:/app
      - validator-worker-nuget:/root/.nuget/packages
    depends_on:
      temporal:
        condition: service_healthy
      account-validation-mock:
        condition: service_started
      document-validation-mock:
        condition: service_started
    networks:
      - devnet

  # ---------------------------------------------------------------------------
  # PayR.Temporal.Psp.Payout.Worker (hot-reload via dotnet watch)
  # ---------------------------------------------------------------------------
  payout-worker:
    image: payr-payout-worker:dev
    build:
      context: ..
      dockerfile: compose/Dockerfile.payout-worker
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: payout
      DOTNET_ENVIRONMENT: Development
    volumes:
      - ..:/app
      - payout-worker-nuget:/root/.nuget/packages
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - devnet

networks:
  devnet:
    driver: bridge

volumes:
  temporal-data:
  worker-nuget:
  web-nuget:
  account-mock-nuget:
  document-mock-nuget:
  validator-worker-nuget:
  payout-worker-nuget:
